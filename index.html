      let openedGifts = [];

      // Cargar regalos abiertos
      function loadOpenedGifts() {
        const saved = localStorage.getItem("adventCalendar_liss");
        if (saved) {
          openedGifts = JSON.parse(saved);
        }
      }

      // Guardar regalos abiertos
      function saveOpenedGifts() {
        localStorage.setItem(
          "adventCalendar_liss",
          JSON.stringify(openedGifts)
        );
      }

      // Crear calendario
      function createCalendar() {
        const calendar = document.getElementById("calendar");
        calendar.innerHTML = "";
        gifts.forEach((gift) => {
          const isOpened = openedGifts.includes(gift.day);
          const button = document.createElement("button");
          button.className = `aspect-square rounded-2xl shadow-lg transform transition-all duration-300 hover:scale-105 hover:shadow-2xl ${
            isOpened
              ? "bg-gradient-to-br from-purple-500 to-pink-500 animate-pulse"
              : gift.color
          } flex flex-col items-center justify-center text-white p-2 relative overflow-hidden`;

          button.innerHTML = `
                    <div class="absolute inset-0 bg-white opacity-0 hover:opacity-10 transition-opacity"></div>
                    <div class="text-2xl md:text-3xl font-bold mb-1">${
                      gift.day
                    }</div>
                    <div class="text-2xl ${isOpened ? "animate-bounce" : ""}">${
            gift.icon
          }</div>
                    ${
                      isOpened
                        ? '<div class="absolute top-1 right-1 text-yellow-300">✨</div>'
                        : ""
                    }
                `;

          button.onclick = () => openGift(gift.day);
          calendar.appendChild(button);
        });
      }

      // Abrir regalo
      function openGift(day) {
        const today = new Date().getDate();
        const currentMonth = new Date().getMonth();

        if (currentMonth !== 11 || day > today) {
          alert("¡Este regalo aún no está disponible! 🎁");
          return;
        }

        if (!openedGifts.includes(day)) {
          openedGifts.push(day);
          saveOpenedGifts();
          createCalendar();
        }

        showModal(gifts.find((g) => g.day === day));
      }

      // Mostrar modal
      function showModal(gift) {
        const modal = document.getElementById("modal");
        const modalContent = document.getElementById("modalContent");
        const modalContainer = modal.querySelector(".modal-content");

        const textColorClass = gift.textColor || "text-white";
        modalContainer.className = `modal-content ${gift.color} rounded-3xl shadow-2xl max-w-md w-full p-8 ${textColorClass} relative`;
        let content = `
                <div class="mb-4 text-6xl animate-bounce">${gift.icon}</div>
                <h2 class="text-3xl font-bold mb-4">Día ${gift.day}</h2>
                <div class="text-lg leading-relaxed mb-6">${gift.content}</div>
            `;

        if (gift.type === "color" && gift.hex) {
          content += `
                    <div class="flex items-center justify-center gap-3 mb-4">
                        <div class="w-16 h-16 rounded-full border-4 border-white shadow-lg" style="background-color: ${gift.hex}"></div>
                        <span class="font-mono text-sm">${gift.hex}</span>
                    </div>
                `;
        }

        // Botón para canciones y libros
        if (
          (gift.type === "song" || gift.type === "book") &&
          gift.link &&
          gift.link !== "TU_ENLACE_AQUI"
        ) {
          const buttonText =
            gift.type === "song" ? "🎵 Escuchar en YouTube" : "📖 Leer libro";
          content += `
                    <a href="${gift.link}" target="_blank" rel="noopener noreferrer" 
                       class="inline-block bg-white text-purple-600 px-6 py-3 rounded-full font-semibold hover:bg-purple-100 transition-colors">
                        ${buttonText}
                    </a>
                `;
        }

        if (gift.type === "photo" && gift.imageUrl) {
          content += `
                    <div class="mb-4">
                        <img src="${gift.imageUrl}" alt="Regalo especial" 
                             class="rounded-2xl shadow-2xl max-h-80 mx-auto object-cover border-4 border-white"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <div style="display:none" class="text-4xl">🎁💜</div>
                    </div>
                `;
        }

        modalContent.innerHTML = content;
        modal.classList.remove("hidden");
      }

      // Cerrar modal
      function closeModal() {
        document.getElementById("modal").classList.add("hidden");
      }

      // Cerrar modal al hacer clic fuera
      document.getElementById("modal").addEventListener("click", function (e) {
        if (e.target === this) closeModal();
      });

      // Inicializar
      loadOpenedGifts();
      createCalendar();
    </script>
